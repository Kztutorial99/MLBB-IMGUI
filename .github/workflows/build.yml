name: Build FR Legends ImGui APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 24
        run: sdkmanager "ndk;24.0.8215888"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/*.apk out/FRLegendsImGui.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FRLegendsImGui
          path: out/FRLegendsImGui.apk
          retention-days: 30
